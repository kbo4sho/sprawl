<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#030306">
  <title>Sprawl — Era II</title>
  <meta name="description" content="A living artwork of 20,000 persistent points. The painting never gains or loses matter. It only rearranges memory.">
  <link rel="canonical" href="https://sprawl.place/era2/">
  <meta property="og:title" content="Sprawl — Era II">
  <meta property="og:description" content="A living artwork of 20,000 persistent points. The painting never gains or loses matter. It only rearranges memory.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sprawl.place/era2/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Sprawl — Era II">
  <meta name="twitter:description" content="A living artwork of 20,000 persistent points. The painting never gains or loses matter. It only rearranges memory.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <canvas id="painting" aria-label="Sprawl Era II living point transition"></canvas>

  <header class="identity">
    <span class="mark">SPRAWL</span>
    <span id="epoch-label">ERA II · LOADING</span>
  </header>

  <section class="now" aria-live="polite">
    <p id="note">Loading the prepared epoch…</p>
    <p id="phase" class="metadata"></p>
  </section>

  <nav class="controls" aria-label="Playback">
    <button id="replay" type="button">Replay latest</button>
    <button id="memory" type="button" aria-controls="memory-panel" aria-expanded="false">Memory</button>
  </nav>

  <aside id="memory-panel" aria-labelledby="memory-title" hidden>
    <p id="memory-title" class="memory-title">Memory</p>
    <p id="memory-summary" class="memory-summary"></p>
    <p class="memory-description">Every accepted transition, played from the beginning.</p>
    <div class="memory-actions">
      <button id="memory-play" type="button">Play all</button>
      <button id="memory-pause" type="button" disabled>Pause</button>
      <button id="memory-return" type="button">Return live</button>
    </div>
  </aside>
  <p id="error" role="alert" hidden></p>

  <script type="module" src="./app.js"></script>
</body>
</html>
