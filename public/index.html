<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #050510;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: #e2e8f0;
    user-select: none;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }

  /* Stats overlay */
  #stats {
    position: fixed;
    top: 18px;
    right: 22px;
    font-size: 12px;
    color: rgba(226,232,240,0.45);
    letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 10;
  }

  /* Join panel */
  #join-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 20px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    z-index: 20;
    background: linear-gradient(to top, rgba(5,5,16,0.95) 0%, rgba(5,5,16,0.6) 70%, transparent 100%);
  }

  #join-panel h2 {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: rgba(226,232,240,0.5);
    text-transform: uppercase;
  }

  #join-form {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  #name-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    color: #e2e8f0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 14px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
  }
  #name-input:focus { border-color: rgba(255,255,255,0.35); }
  #name-input::placeholder { color: rgba(226,232,240,0.3); }

  #color-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .color-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected {
    border-color: rgba(255,255,255,0.8);
    transform: scale(1.25);
    box-shadow: 0 0 8px currentColor;
  }

  #join-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(226,232,240,0.8);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    padding: 8px 22px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
  }
  #join-btn:hover {
    border-color: rgba(255,255,255,0.6);
    color: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.1);
  }

  #my-status {
    font-size: 11px;
    color: rgba(226,232,240,0.4);
    letter-spacing: 0.08em;
  }
  #my-status span { color: rgba(226,232,240,0.7); }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    background: rgba(5,5,16,0.88);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.7;
    color: rgba(226,232,240,0.85);
    display: none;
    white-space: nowrap;
  }
  #tooltip .tip-name { font-size: 13px; color: #fff; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="stats">0 organisms alive</div>

<div id="tooltip">
  <div class="tip-name" id="tip-name"></div>
  <div id="tip-status"></div>
  <div id="tip-uptime"></div>
</div>

<div id="join-panel">
  <h2>Join the Hive</h2>
  <div id="join-form">
    <input type="text" id="name-input" placeholder="your name" maxlength="32" autocomplete="off" spellcheck="false">
    <div id="color-picker"></div>
    <button id="join-btn">Join the Hive</button>
  </div>
  <div id="my-status" id="my-status" style="display:none"></div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const COLORS = [
  '#00ffcc','#ff6b9d','#c084fc','#fbbf24',
  '#34d399','#f472b6','#60a5fa','#a78bfa',
  '#fb923c','#4ade80','#f43f5e','#e2e8f0'
];

const TRAIL_LENGTH = 22;
const PERCEPTION_RADIUS = 90;
const SEPARATION_DIST = 38;
const MAX_SPEED_BASE = 1.6;
const MAX_FORCE = 0.04;
const SPORE_COUNT = 120;
const SYNAPSE_DIST = 75;
const POLL_INTERVAL = 4000;

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = window.innerWidth;
let H = window.innerHeight;
let mouseX = -9999, mouseY = -9999;
let focusOrgId = null;
let cameraX = 0, cameraY = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Spores (background particles) ────────────────────────────────────────────
const spores = [];
for (let i = 0; i < SPORE_COUNT; i++) {
  spores.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    r: Math.random() * 1.5 + 0.3,
    vx: (Math.random() - 0.5) * 0.18,
    vy: (Math.random() - 0.5) * 0.18,
    alpha: Math.random() * 0.35 + 0.05,
    flicker: Math.random() * Math.PI * 2,
  });
}

function updateSpores() {
  for (const s of spores) {
    s.x += s.vx;
    s.y += s.vy;
    s.flicker += 0.015 + Math.random() * 0.01;
    if (s.x < -10) s.x = W + 10;
    if (s.x > W + 10) s.x = -10;
    if (s.y < -10) s.y = H + 10;
    if (s.y > H + 10) s.y = -10;
  }
}

function drawSpores() {
  for (const s of spores) {
    const a = s.alpha * (0.6 + 0.4 * Math.sin(s.flicker));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150,200,255,${a})`;
    ctx.fill();
  }
}

// ─── Organism simulation objects (client-side) ────────────────────────────────
// organisms from server, extended with local simulation state
const simOrgs = {}; // id -> sim object

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function createSim(org) {
  const existing = simOrgs[org.id];
  const rgb = hexToRgb(org.color);
  const speedMult = 0.7 + (org.cpu / 100) * 0.8;
  const radius = 8 + (org.memory / 100) * 12;

  if (existing) {
    // update server-driven properties, preserve position/velocity
    existing.name = org.name;
    existing.color = org.color;
    existing.rgb = rgb;
    existing.status = org.status;
    existing.cpu = org.cpu;
    existing.memory = org.memory;
    existing.agents = org.agents;
    existing.uptime = org.uptime;
    existing.targetRadius = radius;
    existing.maxSpeed = MAX_SPEED_BASE * speedMult;
    return;
  }

  simOrgs[org.id] = {
    id: org.id,
    name: org.name,
    color: org.color,
    rgb,
    status: org.status,
    cpu: org.cpu,
    memory: org.memory,
    agents: org.agents,
    uptime: org.uptime,

    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 0.5) * 2,

    radius,
    targetRadius: radius,
    maxSpeed: MAX_SPEED_BASE * speedMult,

    trail: [],
    phase: Math.random() * Math.PI * 2, // for pulse
    wanderAngle: Math.random() * Math.PI * 2,
  };
}

// ─── Boids ────────────────────────────────────────────────────────────────────
function vecLen(x, y) { return Math.sqrt(x*x + y*y); }

function limit(vx, vy, max) {
  const len = vecLen(vx, vy);
  if (len > max) { return [vx/len*max, vy/len*max]; }
  return [vx, vy];
}

function steer(org, tx, ty) {
  let dx = tx - org.vx, dy = ty - org.vy;
  [dx, dy] = limit(dx, dy, MAX_FORCE);
  return [dx, dy];
}

function applyBoids(orgs) {
  const list = Object.values(orgs);
  for (const o of list) {
    if (o.status === 'sleeping') continue;

    let sepX=0,sepY=0,sepN=0;
    let aliX=0,aliY=0,aliN=0;
    let cohX=0,cohY=0,cohN=0;

    for (const other of list) {
      if (other.id === o.id) continue;
      let dx = other.x - o.x;
      let dy = other.y - o.y;
      // wrap distance
      if (Math.abs(dx) > W/2) dx -= Math.sign(dx)*W;
      if (Math.abs(dy) > H/2) dy -= Math.sign(dy)*H;
      const d = vecLen(dx, dy);

      if (d < SEPARATION_DIST && d > 0) {
        sepX -= dx/d; sepY -= dy/d; sepN++;
      }
      if (d < PERCEPTION_RADIUS) {
        aliX += other.vx; aliY += other.vy; aliN++;
        cohX += other.x; cohY += other.y; cohN++;
      }
    }

    let fx=0, fy=0;

    // separation
    if (sepN > 0) {
      let svx = sepX/sepN, svy = sepY/sepN;
      const sl = vecLen(svx,svy);
      if (sl > 0) { svx=svx/sl*o.maxSpeed; svy=svy/sl*o.maxSpeed; }
      const [sx,sy] = steer(o, svx, svy);
      fx += sx*1.6; fy += sy*1.6;
    }

    // alignment
    if (aliN > 0) {
      let avx = aliX/aliN, avy = aliY/aliN;
      const al = vecLen(avx,avy);
      if (al > 0) { avx=avx/al*o.maxSpeed; avy=avy/al*o.maxSpeed; }
      const [ax,ay] = steer(o, avx, avy);
      fx += ax*1.0; fy += ay*1.0;
    }

    // cohesion
    if (cohN > 0) {
      const cx = cohX/cohN - o.x;
      const cy = cohY/cohN - o.y;
      const cl = vecLen(cx,cy);
      let tvx=0,tvy=0;
      if (cl > 0) { tvx=cx/cl*o.maxSpeed; tvy=cy/cl*o.maxSpeed; }
      const [cvx,cvy] = steer(o, tvx, tvy);
      fx += cvx*0.8; fy += cvy*0.8;
    }

    // wander
    o.wanderAngle += (Math.random()-0.5)*0.35;
    fx += Math.cos(o.wanderAngle)*MAX_FORCE*0.6;
    fy += Math.sin(o.wanderAngle)*MAX_FORCE*0.6;

    // mouse repulsion
    const mdx = o.x - mouseX, mdy = o.y - mouseY;
    const md = vecLen(mdx,mdy);
    if (md < 120 && md > 0) {
      const mf = (1 - md/120) * 0.12;
      fx += (mdx/md)*mf;
      fy += (mdy/md)*mf;
    }

    o.vx += fx; o.vy += fy;
    [o.vx, o.vy] = limit(o.vx, o.vy, o.maxSpeed);

    // update trail
    o.trail.push({x: o.x, y: o.y});
    const maxTrail = 8 + Math.floor((o.uptime / 3600) * 14);
    if (o.trail.length > Math.min(maxTrail, TRAIL_LENGTH)) o.trail.shift();

    // move
    o.x += o.vx;
    o.y += o.vy;

    // wrap
    if (o.x < -20) o.x = W+20;
    if (o.x > W+20) o.x = -20;
    if (o.y < -20) o.y = H+20;
    if (o.y > H+20) o.y = -20;

    // smooth radius
    o.radius += (o.targetRadius - o.radius) * 0.05;
    o.phase += 0.025;
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function drawTrail(o) {
  if (o.trail.length < 2) return;
  const {r,g,b} = o.rgb;
  const sleeping = o.status === 'sleeping';
  const alphaScale = sleeping ? 0.3 : 1;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (let i = 1; i < o.trail.length; i++) {
    const t = i / o.trail.length;
    const alpha = t * 0.5 * alphaScale;
    const width = t * (o.radius * 0.55);
    const p0 = o.trail[i-1];
    const p1 = o.trail[i];

    // avoid giant lines on wrap
    const dx = Math.abs(p1.x - p0.x), dy = Math.abs(p1.y - p0.y);
    if (dx > W/2 || dy > H/2) continue;

    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth = Math.max(0.5, width);
    ctx.stroke();
  }
  ctx.restore();
}

function drawOrganism(o, isMe, hovered) {
  const {r,g,b} = o.rgb;
  const sleeping = o.status === 'sleeping';
  const alphaScale = sleeping ? 0.35 : 1;

  // pulse
  const pulse = Math.sin(o.phase) * 0.12 + 1;
  const rad = o.radius * pulse;

  // glow intensity from agents
  const glowMult = sleeping ? 0.4 : 0.6 + (o.agents / 10) * 0.6;

  // halo
  const haloRad = rad * 2.8;
  const halo = ctx.createRadialGradient(o.x, o.y, rad*0.4, o.x, o.y, haloRad);
  halo.addColorStop(0, `rgba(${r},${g},${b},${0.18*alphaScale*glowMult})`);
  halo.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.beginPath();
  ctx.arc(o.x, o.y, haloRad, 0, Math.PI*2);
  ctx.fillStyle = halo;
  ctx.fill();

  // outer glow ring
  const glow = ctx.createRadialGradient(o.x, o.y, rad*0.5, o.x, o.y, rad*1.8);
  glow.addColorStop(0, `rgba(${r},${g},${b},${0.45*alphaScale*glowMult})`);
  glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.beginPath();
  ctx.arc(o.x, o.y, rad*1.8, 0, Math.PI*2);
  ctx.fillStyle = glow;
  ctx.fill();

  // body
  const body = ctx.createRadialGradient(o.x - rad*0.25, o.y - rad*0.25, 0, o.x, o.y, rad);
  body.addColorStop(0, `rgba(255,255,255,${0.95*alphaScale})`);
  body.addColorStop(0.3, `rgba(${r},${g},${b},${0.9*alphaScale})`);
  body.addColorStop(1, `rgba(${r},${g},${b},${0.15*alphaScale})`);
  ctx.beginPath();
  ctx.arc(o.x, o.y, rad, 0, Math.PI*2);
  ctx.fillStyle = body;
  ctx.fill();

  // my-organism ring
  if (isMe) {
    ctx.beginPath();
    ctx.arc(o.x, o.y, rad + 4, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,255,255,${0.5 + 0.3*Math.sin(o.phase*2)})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // name label
  const nameAlpha = hovered ? 0.9 : (isMe ? 0.55 : 0.18);
  ctx.fillStyle = `rgba(226,232,240,${nameAlpha})`;
  ctx.font = `10px 'Share Tech Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(o.name, o.x, o.y + rad + 14);
}

function drawSynapses(orgs) {
  const list = Object.values(orgs);
  for (let i = 0; i < list.length; i++) {
    const a = list[i];
    for (let j = i+1; j < list.length; j++) {
      const b = list[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = vecLen(dx, dy);
      if (d < SYNAPSE_DIST && d > 0) {
        const t = 1 - d/SYNAPSE_DIST;
        const {r:ar,g:ag,b:ab} = a.rgb;
        const {r:br,g:bg,b:bb} = b.rgb;
        const mr = (ar+br)/2, mg = (ag+bg)/2, mb_ = (ab+bb)/2;
        const alpha = t * 0.35;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(${mr},${mg},${mb_},${alpha})`;
        ctx.lineWidth = t * 1.5;
        ctx.stroke();
      }
    }
  }
}

// ─── Tooltip & hover ──────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let hoveredId = null;

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  hoveredId = null;
  for (const o of Object.values(simOrgs)) {
    const dx = o.x - e.clientX, dy = o.y - e.clientY;
    if (Math.sqrt(dx*dx+dy*dy) < o.radius + 8) {
      hoveredId = o.id;
      break;
    }
  }
  if (hoveredId) {
    const o = simOrgs[hoveredId];
    document.getElementById('tip-name').textContent = o.name;
    document.getElementById('tip-status').textContent = `status: ${o.status}`;
    const h = Math.floor(o.uptime / 3600);
    document.getElementById('tip-uptime').textContent = `uptime: ${h}h`;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => {
  mouseX = -9999; mouseY = -9999;
  hoveredId = null;
  tooltip.style.display = 'none';
});

canvas.addEventListener('click', e => {
  for (const o of Object.values(simOrgs)) {
    const dx = o.x - e.clientX, dy = o.y - e.clientY;
    if (Math.sqrt(dx*dx+dy*dy) < o.radius + 8) {
      focusOrgId = o.id;
      return;
    }
  }
  focusOrgId = null;
});

// touch support
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
}, {passive: true});

// ─── Spawn animation ──────────────────────────────────────────────────────────
const spawnFX = []; // {x,y,color,t}

function triggerSpawn(x, y, color) {
  spawnFX.push({x, y, color, rgb: hexToRgb(color), t: 0});
}

function drawSpawnFX() {
  for (let i = spawnFX.length-1; i >= 0; i--) {
    const fx = spawnFX[i];
    fx.t += 0.025;
    if (fx.t > 1) { spawnFX.splice(i,1); continue; }

    const {r,g,b} = fx.rgb;
    const ease = 1 - Math.pow(1 - fx.t, 3);
    const maxR = 120;
    const rad = ease * maxR;
    const alpha = (1 - fx.t) * 0.7;

    ctx.beginPath();
    ctx.arc(fx.x, fx.y, rad, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // inner flash
    if (fx.t < 0.3) {
      const fa = (0.3 - fx.t)/0.3 * 0.9;
      const flashR = ctx.createRadialGradient(fx.x, fx.y, 0, fx.x, fx.y, fx.t*80+10);
      flashR.addColorStop(0, `rgba(255,255,255,${fa})`);
      flashR.addColorStop(0.4, `rgba(${r},${g},${b},${fa*0.6})`);
      flashR.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.beginPath();
      ctx.arc(fx.x, fx.y, fx.t*80+10, 0, Math.PI*2);
      ctx.fillStyle = flashR;
      ctx.fill();
    }
  }
}

// ─── Main render loop ─────────────────────────────────────────────────────────
let myId = localStorage.getItem('hive_id');

function render() {
  // background fade
  ctx.fillStyle = 'rgba(5,5,16,0.22)';
  ctx.fillRect(0, 0, W, H);

  updateSpores();
  drawSpores();

  applyBoids(simOrgs);

  // draw synapses first (below organisms)
  drawSynapses(simOrgs);

  // draw trails
  for (const o of Object.values(simOrgs)) drawTrail(o);

  // draw organisms
  for (const o of Object.values(simOrgs)) {
    drawOrganism(o, o.id === myId, o.id === hoveredId);
  }

  drawSpawnFX();

  // stats
  const count = Object.keys(simOrgs).length;
  document.getElementById('stats').textContent = `${count} organism${count===1?'':'s'} alive`;

  requestAnimationFrame(render);
}

// ─── Server sync ──────────────────────────────────────────────────────────────
async function fetchState() {
  try {
    const res = await fetch('/api/state');
    const orgs = await res.json();
    const serverIds = new Set(orgs.map(o => o.id));

    // remove gone organisms
    for (const id of Object.keys(simOrgs)) {
      if (!serverIds.has(id)) delete simOrgs[id];
    }

    // create/update
    for (const org of orgs) createSim(org);
  } catch(e) {
    console.warn('State fetch failed:', e.message);
  }
}

// ─── Join form ────────────────────────────────────────────────────────────────
const colorPicker = document.getElementById('color-picker');
let selectedColor = COLORS[0];

COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
  sw.style.background = c;
  sw.style.boxShadow = `0 0 6px ${c}88`;
  sw.title = c;
  sw.onclick = () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    sw.classList.add('selected');
    selectedColor = c;
  };
  colorPicker.appendChild(sw);
});

document.getElementById('join-btn').onclick = async () => {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('name-input').focus();
    return;
  }

  try {
    const res = await fetch('/api/join', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, color: selectedColor}),
    });
    const data = await res.json();
    if (data.id) {
      myId = data.id;
      localStorage.setItem('hive_id', myId);
      localStorage.setItem('hive_name', name);
      localStorage.setItem('hive_color', selectedColor);

      // place organism near center for dramatic entry
      createSim(data.organism);
      const org = simOrgs[myId];
      if (org) {
        org.x = W/2 + (Math.random()-0.5)*60;
        org.y = H/2 + (Math.random()-0.5)*60;
      }

      triggerSpawn(W/2, H/2, selectedColor);

      const myStatus = document.getElementById('my-status');
      myStatus.innerHTML = `you are <span>${name}</span> &mdash; id: <span>${myId.slice(0,8)}</span>`;
      myStatus.style.display = 'block';
    }
  } catch(e) {
    console.error('Join failed:', e);
  }
};

// restore from localStorage
(function restoreSession() {
  const savedId = localStorage.getItem('hive_id');
  const savedName = localStorage.getItem('hive_name');
  const savedColor = localStorage.getItem('hive_color');
  if (savedName) document.getElementById('name-input').value = savedName;
  if (savedColor) {
    selectedColor = savedColor;
    document.querySelectorAll('.color-swatch').forEach(sw => {
      if (sw.title === savedColor) sw.classList.add('selected');
      else sw.classList.remove('selected');
    });
  }
})();

// ─── Boot ─────────────────────────────────────────────────────────────────────
fetchState();
setInterval(fetchState, POLL_INTERVAL);
render();
</script>
</body>
</html>
