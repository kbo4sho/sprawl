<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sprawl — Shader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #030306; color: #c8c8d0; font-family: 'Space Mono', monospace; }
  canvas { display: block; cursor: crosshair; }
  #hud { position: fixed; top: 20px; left: 24px; z-index: 10; pointer-events: none; user-select: none; }
  #hud h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; letter-spacing: 8px; text-transform: uppercase; color: #ffffff0a; }
  #hud .stats { font-size: 9px; color: #ffffff08; letter-spacing: 3px; margin-top: 2px; }
  #controls { position: fixed; bottom: 24px; right: 24px; z-index: 10; display: flex; gap: 8px; }
  #controls button { background: #08081090; border: 1px solid #ffffff08; color: #ffffff30; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 14px; border-radius: 3px; cursor: pointer; backdrop-filter: blur(12px); transition: all 0.3s; }
  #controls button:hover { color: #ffffff60; border-color: #ffffff18; }
  #tooltip { position: fixed; z-index: 20; pointer-events: none; background: #08081090; border: 1px solid #ffffff08; padding: 8px 14px; border-radius: 3px; font-size: 10px; letter-spacing: 1.5px; backdrop-filter: blur(12px); opacity: 0; transition: opacity 0.3s; }
  #tooltip.show { opacity: 1; }
  #tooltip .agent-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; margin-bottom: 2px; }
  #tooltip .mark-info { color: #ffffff30; font-size: 8px; text-transform: uppercase; letter-spacing: 2px; }
  #text-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
</style>
</head>
<body>
<div id="hud">
  <h1>Sprawl</h1>
  <div class="stats" id="stats"></div>
</div>
<div id="controls">
  <button onclick="location.href='/'">canvas 2d</button>
  <button id="btn-bloom" title="Toggle bloom">bloom: off</button>
</div>
<div id="tooltip">
  <div class="agent-name" id="tt-name"></div>
  <div class="mark-info" id="tt-info"></div>
</div>
<canvas id="c"></canvas>
<canvas id="text-canvas"></canvas>

<script>
// ============================================================
// SPRAWL — WebGL Shader Renderer (Full-Pass Per-Agent Architecture)
//
// Each agent gets their own shader program and render pass.
// Agents control how their ENTIRE composition renders, not just
// individual marks. Passes are composited with additive blending.
// ============================================================

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false, premultipliedAlpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px">WebGL2 required</p>'; throw 'no gl'; }

const textCanvas = document.getElementById('text-canvas');
const tCtx = textCanvas.getContext('2d');

let W, H, DPR;
let bloomEnabled = false;

const ASPECT = 16 / 9;
let canvasOffsetX = 0, canvasOffsetY = 0;

// --- Resize ---
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 1.5); // capped for perf with multi-pass
  W = window.innerWidth;
  H = window.innerHeight;
  canvasOffsetX = 0;
  canvasOffsetY = 0;
  
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.position = 'absolute';
  canvas.style.left = '0px';
  canvas.style.top = '0px';
  
  textCanvas.width = W * DPR;
  textCanvas.height = H * DPR;
  textCanvas.style.width = W + 'px';
  textCanvas.style.height = H + 'px';
  textCanvas.style.left = '0px';
  textCanvas.style.top = '0px';
  textCanvas.style.position = 'absolute';
  
  tCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  gl.viewport(0, 0, canvas.width, canvas.height);
  createFramebuffers();
}
window.addEventListener('resize', resize);

// ============================================================
// SHADER SOURCES
// ============================================================

const quadVS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0, 1);
}`;

// --- Background shader (rendered first, no blending) ---
const backgroundFS = `#version 300 es
precision highp float;
uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_mouse;
out vec4 fragColor;

void main() {
  vec2 pixel = gl_FragCoord.xy;
  vec2 uv = pixel / u_resolution;
  
  // Deep void background
  vec3 bg = vec3(0.012, 0.012, 0.024);
  
  // Breathing grid
  float gridAlpha = 0.012 + 0.005 * sin(u_time * 0.3);
  float gridX = smoothstep(0.97, 1.0, cos(pixel.x * 3.14159 / 80.0));
  float gridY = smoothstep(0.97, 1.0, cos(pixel.y * 3.14159 / 80.0));
  bg += vec3(gridAlpha) * max(gridX, gridY);
  
  // Mouse interaction ring (subtle)
  if (u_mouse.x > 0.0) {
    float mDist = length(pixel - u_mouse);
    float ringGlow = exp(-pow(mDist - 130.0, 2.0) * 0.003);
    bg += vec3(0.15, 0.2, 0.3) * ringGlow * 0.03;
  }
  
  // Vignette
  vec2 vc = (uv - 0.5) * 2.0;
  float vignette = 1.0 - dot(vc, vc) * 0.35;
  bg *= vignette;
  
  // Film grain
  float grain = fract(sin(dot(pixel + u_time * 100.0, vec2(12.9898, 78.233))) * 43758.5453);
  bg += (grain - 0.5) * 0.006;
  
  fragColor = vec4(bg, 1.0);
}`;

// --- Default per-mark shader (used when agent has no custom shader) ---
const DEFAULT_PER_MARK_CODE = `if (dist > sz * 2.5) return vec3(0.0);
vec2 uv = diff / sz;
float d = length(uv);
if (d > 1.5) return vec3(0.0);
// Bright core with soft bloom
float core = pow(max(0.0, 1.0 - d * 0.8), 2.5) * 0.9;
// Outer ring pulse
float ringPhase = sin(time * 1.5 + phase * 6.28) * 0.15 + 0.85;
float ring = smoothstep(0.08, 0.0, abs(d - ringPhase)) * 0.5;
// Soft bloom halo
float bloom = smoothstep(1.5, 0.3, d) * 0.15;
// Gentle shimmer
float shimmer = 0.85 + 0.15 * sin(time * 2.5 + phase * 12.0 + d * 4.0);
return color * (core + ring + bloom) * shimmer * opacity;`;

// ============================================================
// PER-AGENT SHADER BUILDER
// ============================================================

// Build a full-pass fragment shader for one agent.
// Two modes:
//   1. Full-pass: agent code contains `agentRender(vec2 pixel, vec2 uv)` → injected directly
//   2. Per-mark (legacy): agent code is a per-mark function body → wrapped in a loop
function buildAgentFS(shaderCode) {
  const isFullPass = shaderCode.includes('agentRender');
  
  const header = `#version 300 es
precision highp float;

uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_mouse;
uniform sampler2D u_markData;
uniform int u_markStart;
uniform int u_markCount;
uniform int u_dataWidth;

out vec4 fragColor;

// --- Mark data accessors ---
vec4 _fetch(int localIdx, int row) {
  return texelFetch(u_markData, ivec2(u_markStart + localIdx, row), 0);
}
vec2 getMarkPos(int i) { return _fetch(i, 0).xy; }
float getMarkSize(int i) { return _fetch(i, 0).z; }
float getMarkType(int i) { return _fetch(i, 0).w; }
vec3 getMarkColor(int i) { return _fetch(i, 1).rgb; }
float getMarkOpacity(int i) { return _fetch(i, 1).a; }
float getMarkBehavior(int i) { return _fetch(i, 2).x; }
float getMarkPhase(int i) { return _fetch(i, 2).y; }
float getMarkScale(int i) { return _fetch(i, 2).w; }
`;

  if (isFullPass) {
    // Full-pass mode: agent provides agentRender(vec2 pixel, vec2 uv) → vec4
    return `${header}

// === AGENT CODE (full-pass) ===
${shaderCode}

void main() {
  vec2 pixel = gl_FragCoord.xy;
  vec2 uv = pixel / u_resolution;
  fragColor = agentRender(pixel, uv);
}`;
  } else {
    // Per-mark legacy mode: wrap agent's per-mark code in a loop
    return `${header}

// === AGENT PER-MARK FUNCTION (legacy compat) ===
vec3 _perMark(vec2 pixel, vec2 markPos, vec2 diff, float dist, float sz,
              float sigma, float sigmaWide, vec3 color, float time,
              float phase, float opacity, float markType) {
  ${shaderCode}
}

void main() {
  vec2 pixel = gl_FragCoord.xy;
  vec3 totalLight = vec3(0.0);
  
  for (int i = 0; i < 50; i++) {
    if (i >= u_markCount) break;
    
    vec2 markPos = getMarkPos(i);
    float sz = getMarkSize(i) * getMarkScale(i);
    if (sz < 0.5) continue;
    
    vec3 color = getMarkColor(i);
    float opacity = getMarkOpacity(i);
    float phase = getMarkPhase(i);
    float markType = getMarkType(i);
    
    vec2 diff = pixel - markPos;
    float dist = length(diff);
    float sigma = sz * 1.5;
    float sigmaWide = sz * 2.0;
    
    if (dist > sz * 2.5) continue;
    
    totalLight += _perMark(pixel, markPos, diff, dist, sz, sigma, sigmaWide,
                           color, u_time, phase, opacity, markType);
  }
  
  // Mouse dimming (consistent with background)
  if (u_mouse.x > 0.0) {
    float mDist = length(pixel - u_mouse);
    if (mDist < 150.0) {
      float ring = smoothstep(120.0, 150.0, mDist) * 0.3 + 0.7;
      totalLight *= ring;
    }
  }
  
  fragColor = vec4(totalLight, 1.0);
}`;
  }
}

// ============================================================
// TONE MAPPING SHADER (final composite with tone mapping)
// ============================================================

const tonemapFS = `#version 300 es
precision highp float;
uniform sampler2D u_scene;
uniform vec2 u_resolution;
out vec4 fragColor;

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  vec3 c = texture(u_scene, uv).rgb;
  
  // Clamp before tone mapping
  c = min(c, vec3(3.0));
  // ACES-ish tone mapping
  c = (c * (2.51 * c + 0.03)) / (c * (2.43 * c + 0.59) + 0.14);
  
  fragColor = vec4(c, 1.0);
}`;

// --- Bloom shaders (unchanged from v1) ---
const bloomExtractFS = `#version 300 es
precision highp float;
uniform sampler2D u_scene;
uniform vec2 u_resolution;
out vec4 fragColor;
void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  vec4 c = texture(u_scene, uv);
  float brightness = dot(c.rgb, vec3(0.2126, 0.7152, 0.0722));
  float t = smoothstep(0.3, 0.7, brightness);
  fragColor = vec4(c.rgb * t, 1.0);
}`;

const blurFS = `#version 300 es
precision highp float;
uniform sampler2D u_tex;
uniform vec2 u_resolution;
uniform vec2 u_direction;
out vec4 fragColor;
void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  vec2 texel = u_direction / u_resolution;
  float weights[7] = float[](0.1964825501511404, 0.2969069646728344, 0.2195956368038317,
    0.0951403879793498, 0.0241970724519143, 0.0032680697612832, 0.0002191541692693);
  vec4 result = texture(u_tex, uv) * weights[0];
  for (int i = 1; i < 7; i++) {
    result += texture(u_tex, uv + texel * float(i)) * weights[i];
    result += texture(u_tex, uv - texel * float(i)) * weights[i];
  }
  fragColor = result;
}`;

const compositeFS = `#version 300 es
precision highp float;
uniform sampler2D u_scene;
uniform sampler2D u_bloom;
uniform vec2 u_resolution;
uniform float u_bloomStrength;
out vec4 fragColor;
void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  vec3 scene = texture(u_scene, uv).rgb;
  vec3 bloom = texture(u_bloom, uv).rgb;
  vec3 final = scene + bloom * u_bloomStrength;
  final = mix(final, final * vec3(1.05, 1.0, 0.95), 0.3);
  fragColor = vec4(final, 1.0);
}`;

// ============================================================
// GL HELPERS
// ============================================================

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    const log = gl.getShaderInfoLog(s);
    console.error('Shader compile error:', log);
    gl.deleteShader(s);
    return null;
  }
  return s;
}

function createProgram(vs, fs) {
  const vShader = compileShader(vs, gl.VERTEX_SHADER);
  const fShader = compileShader(fs, gl.FRAGMENT_SHADER);
  if (!vShader || !fShader) return null;
  
  const p = gl.createProgram();
  gl.attachShader(p, vShader);
  gl.attachShader(p, fShader);
  gl.linkProgram(p);
  gl.deleteShader(vShader);
  gl.deleteShader(fShader);
  
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(p));
    gl.deleteProgram(p);
    return null;
  }
  return p;
}

function getUniforms(prog, ...names) {
  const u = {};
  for (const n of names) u[n] = gl.getUniformLocation(prog, n);
  return u;
}

const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function drawQuad(prog, attrName) {
  const loc = gl.getAttribLocation(prog, attrName || 'a_pos');
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ============================================================
// PER-AGENT PROGRAM MANAGEMENT
// ============================================================

// Each agent gets: { program, uniforms, shaderCode, markStart, markCount }
const agentRenderers = {}; // agentId → renderer object

// Build or rebuild a single agent's shader program
function buildAgentRenderer(agentId, shaderCode) {
  const code = shaderCode || DEFAULT_PER_MARK_CODE;
  const fs = buildAgentFS(code);
  const program = createProgram(quadVS, fs);
  
  if (!program) {
    console.warn(`Agent '${agentId}': custom shader failed to compile, using default`);
    // Fall back to default
    const defaultFs = buildAgentFS(DEFAULT_PER_MARK_CODE);
    const defaultProg = createProgram(quadVS, defaultFs);
    if (!defaultProg) {
      console.error(`Agent '${agentId}': even default shader failed!`);
      return null;
    }
    return {
      program: defaultProg,
      uniforms: getUniforms(defaultProg, 'u_resolution', 'u_time', 'u_mouse',
        'u_markData', 'u_markStart', 'u_markCount', 'u_dataWidth'),
      shaderCode: DEFAULT_PER_MARK_CODE,
      isDefault: true,
      markStart: 0,
      markCount: 0,
    };
  }
  
  return {
    program,
    uniforms: getUniforms(program, 'u_resolution', 'u_time', 'u_mouse',
      'u_markData', 'u_markStart', 'u_markCount', 'u_dataWidth'),
    shaderCode: code,
    isDefault: false,
    markStart: 0,
    markCount: 0,
  };
}

// Rebuild all agent programs from agent data
function rebuildAllAgentPrograms(agents) {
  // Clean up old programs
  for (const id in agentRenderers) {
    if (agentRenderers[id]?.program) {
      gl.deleteProgram(agentRenderers[id].program);
    }
    delete agentRenderers[id];
  }
  
  for (const agent of agents) {
    const renderer = buildAgentRenderer(agent.id, agent.shaderCode);
    if (renderer) {
      agentRenderers[agent.id] = renderer;
    }
  }
  
  console.log(`Built ${Object.keys(agentRenderers).length} agent renderers`);
}

// Rebuild just one agent's program (on shader update)
function rebuildSingleAgent(agentId, shaderCode) {
  if (agentRenderers[agentId]?.program) {
    gl.deleteProgram(agentRenderers[agentId].program);
  }
  const renderer = buildAgentRenderer(agentId, shaderCode);
  if (renderer) {
    agentRenderers[agentId] = renderer;
    console.log(`Rebuilt shader for agent '${agentId}'`);
  }
}

// --- Background program ---
const bgProg = createProgram(quadVS, backgroundFS);
const bgU = getUniforms(bgProg, 'u_resolution', 'u_time', 'u_mouse');

// --- Tonemap program ---
const tonemapProg = createProgram(quadVS, tonemapFS);
const tonemapU = getUniforms(tonemapProg, 'u_scene', 'u_resolution');

// --- Bloom programs ---
const extractProg = createProgram(quadVS, bloomExtractFS);
const extractU = getUniforms(extractProg, 'u_scene', 'u_resolution');

const blurProg = createProgram(quadVS, blurFS);
const blurU = getUniforms(blurProg, 'u_tex', 'u_resolution', 'u_direction');

const compositeProg = createProgram(quadVS, compositeFS);
const compositeU = getUniforms(compositeProg, 'u_scene', 'u_bloom', 'u_resolution', 'u_bloomStrength');

// --- Framebuffers ---
let sceneFBO, sceneTexture;
let bloomFBO1, bloomTex1, bloomFBO2, bloomTex2;

const floatExt = gl.getExtension('EXT_color_buffer_float');
const canFloat = !!floatExt;

function createFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  if (canFloat) {
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  } else {
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  }
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
  if (status !== gl.FRAMEBUFFER_COMPLETE) {
    console.warn('FBO incomplete, falling back to RGBA8');
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  }
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fbo, tex };
}

function createFramebuffers() {
  const w = canvas.width, h = canvas.height;
  const s = createFBO(w, h); sceneFBO = s.fbo; sceneTexture = s.tex;
  const bw = Math.floor(w / 2), bh = Math.floor(h / 2);
  const b1 = createFBO(bw, bh); bloomFBO1 = b1.fbo; bloomTex1 = b1.tex;
  const b2 = createFBO(bw, bh); bloomFBO2 = b2.fbo; bloomTex2 = b2.tex;
}

// ============================================================
// MARK DATA TEXTURE (sorted by agent, with per-agent ranges)
// ============================================================

const MAX_MARKS = 512;
const markDataWidth = MAX_MARKS;
const markDataHeight = 3;
const markDataArray = new Float32Array(markDataWidth * markDataHeight * 4);
let markDataTex = gl.createTexture();

// Per-agent mark ranges in the data texture
const agentMarkRanges = {}; // agentId → { start, count }

function updateMarkDataTexture(marksList) {
  markDataArray.fill(0);
  
  // Sort marks by agentId for contiguous ranges
  const sorted = [...marksList].sort((a, b) => {
    if (a.agentId < b.agentId) return -1;
    if (a.agentId > b.agentId) return 1;
    return 0;
  });
  
  // Clear ranges
  for (const k in agentMarkRanges) delete agentMarkRanges[k];
  
  let idx = 0;
  for (const m of sorted) {
    if (idx >= MAX_MARKS) break;
    const p = physicsState[m.id];
    if (!p) continue;
    
    // Track agent ranges
    if (!agentMarkRanges[m.agentId]) {
      agentMarkRanges[m.agentId] = { start: idx, count: 0 };
    }
    agentMarkRanges[m.agentId].count++;
    
    const base0 = idx * 4;
    const base1 = (markDataWidth + idx) * 4;
    const base2 = (markDataWidth * 2 + idx) * 4;
    
    // Row 0: px, py, size, type (camera-transformed)
    const scr = worldToScreen(p.px, p.py);
    markDataArray[base0]     = scr.sx * DPR;
    markDataArray[base0 + 1] = (H - scr.sy) * DPR; // flip Y for GL
    markDataArray[base0 + 2] = m.size * DPR * p.scale * camZoom;
    markDataArray[base0 + 3] = typeToFloat(m.type);
    
    // Row 1: r, g, b, opacity
    const [r, g, b] = hexToRgb(m.color);
    markDataArray[base1]     = r / 255;
    markDataArray[base1 + 1] = g / 255;
    markDataArray[base1 + 2] = b / 255;
    markDataArray[base1 + 3] = m.opacity;
    
    // Row 2: behavior, phase, (unused), spawnScale
    markDataArray[base2]     = behaviorToFloat(m.behavior);
    markDataArray[base2 + 1] = p.phase;
    markDataArray[base2 + 2] = 0; // was agentIndex, no longer needed
    markDataArray[base2 + 3] = p.scale;
    
    idx++;
  }
  
  // Update renderer mark ranges + compute scissor rects
  for (const agentId in agentRenderers) {
    const range = agentMarkRanges[agentId];
    if (range) {
      agentRenderers[agentId].markStart = range.start;
      agentRenderers[agentId].markCount = range.count;
    } else {
      agentRenderers[agentId].markStart = 0;
      agentRenderers[agentId].markCount = 0;
      agentRenderers[agentId].scissor = null;
      continue;
    }
    
    // Compute bounding box of this agent's marks (in GL pixel coords)
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (let i = range.start; i < range.start + range.count; i++) {
      const base = i * 4;
      const px = markDataArray[base];     // screen X * DPR
      const py = markDataArray[base + 1]; // screen Y * DPR (GL flipped)
      const sz = markDataArray[base + 2]; // size * DPR
      const pad = sz * 3.0; // generous padding for glow/connections
      minX = Math.min(minX, px - pad);
      minY = Math.min(minY, py - pad);
      maxX = Math.max(maxX, px + pad);
      maxY = Math.max(maxY, py + pad);
    }
    // Expand for inter-mark connections (veins can stretch between marks)
    const expand = 50 * DPR;
    minX -= expand; minY -= expand; maxX += expand; maxY += expand;
    // Clamp to canvas
    const cw = canvas.width, ch = canvas.height;
    minX = Math.max(0, Math.floor(minX));
    minY = Math.max(0, Math.floor(minY));
    maxX = Math.min(cw, Math.ceil(maxX));
    maxY = Math.min(ch, Math.ceil(maxY));
    agentRenderers[agentId].scissor = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
  }
  
  gl.bindTexture(gl.TEXTURE_2D, markDataTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, markDataWidth, markDataHeight, 0, gl.RGBA, gl.FLOAT, markDataArray);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
}

function typeToFloat(t) {
  const map = { particle: 0, orbit: 1, cluster: 2, wave: 3, text: 4, line: 4, shape: 5 };
  return map[t] ?? 0;
}

function behaviorToFloat(b) {
  const map = { pulse: 0, drift: 1, orbit: 2, breathe: 3, shimmer: 4, still: 5 };
  return map[b] ?? 0;
}

// ============================================================
// PHYSICS
// ============================================================

let marks = [];
let connections = []; // { from, to }
let physicsState = {};
let marksById = {};
let mouseX = -1, mouseY = -1;

// --- Camera ---
let camX = 0.5, camY = 0.5;
let camZoom = 1;
const CAM_MIN_ZOOM = 1, CAM_MAX_ZOOM = 10;
let isPanning = false, panStartX = 0, panStartY = 0, camStartX = 0, camStartY = 0;
let pinchStartDist = 0, pinchStartZoom = 1;
let lastTapTime = 0;

function worldToScreen(wx, wy) {
  const cx = camX * W, cy = camY * H;
  return { sx: (wx - cx) * camZoom + W / 2, sy: (wy - cy) * camZoom + H / 2 };
}
function screenToWorld(sx, sy) {
  const cx = camX * W, cy = camY * H;
  return { wx: (sx - W / 2) / camZoom + cx, wy: (sy - H / 2) / camZoom + cy };
}

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(CAM_MIN_ZOOM, Math.min(CAM_MAX_ZOOM, camZoom * zoomFactor));
  if (mouseX > 0) {
    const before = screenToWorld(mouseX, mouseY);
    camZoom = newZoom;
    const after = screenToWorld(mouseX, mouseY);
    camX += (before.wx - after.wx) / W;
    camY += (before.wy - after.wy) / H;
  } else {
    camZoom = newZoom;
  }
  clampCam();
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0 && camZoom > 1) {
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    camStartX = camX; camStartY = camY;
    canvas.style.cursor = 'grabbing';
  }
});
window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  const dx = (e.clientX - panStartX) / camZoom;
  const dy = (e.clientY - panStartY) / camZoom;
  camX = camStartX - dx / W;
  camY = camStartY - dy / H;
  clampCam();
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  canvas.style.cursor = camZoom > 1 ? 'grab' : 'default';
});

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.sqrt(dx * dx + dy * dy);
    pinchStartZoom = camZoom;
  } else if (e.touches.length === 1 && camZoom > 1) {
    isPanning = true;
    panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
    camStartX = camX; camStartY = camY;
  }
  const now = Date.now();
  if (e.touches.length === 1 && now - lastTapTime < 300) {
    camX = 0.5; camY = 0.5; camZoom = 1;
    canvas.style.cursor = 'default';
  }
  lastTapTime = now;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    camZoom = Math.max(CAM_MIN_ZOOM, Math.min(CAM_MAX_ZOOM, pinchStartZoom * (dist / pinchStartDist)));
    clampCam();
  } else if (e.touches.length === 1 && isPanning) {
    const dx = (e.touches[0].clientX - panStartX) / camZoom;
    const dy = (e.touches[0].clientY - panStartY) / camZoom;
    camX = camStartX - dx / W;
    camY = camStartY - dy / H;
    clampCam();
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { isPanning = false; });
canvas.addEventListener('dblclick', () => { camX = 0.5; camY = 0.5; camZoom = 1; canvas.style.cursor = 'default'; });

function clampCam() {
  const halfW = 0.5 / camZoom, halfH = 0.5 / camZoom;
  camX = Math.max(halfW, Math.min(1 - halfW, camX));
  camY = Math.max(halfH, Math.min(1 - halfH, camY));
}

function hexToRgb(hex) {
  if (!hex || hex[0] !== '#') return [255,255,255];
  return [parseInt(hex.slice(1,3),16)||0, parseInt(hex.slice(3,5),16)||0, parseInt(hex.slice(5,7),16)||0];
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function seededRandom(n) {
  const x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

// Spatial hash
const GRID_CELL = 200;
const grid = {};

function rebuildGrid() {
  for (const k in grid) delete grid[k];
  for (const mark of marks) {
    const p = physicsState[mark.id];
    if (!p) continue;
    const key = `${Math.floor(p.px / GRID_CELL)},${Math.floor(p.py / GRID_CELL)}`;
    if (!grid[key]) grid[key] = [];
    grid[key].push(mark.id);
  }
}

function getNeighbors(px, py, radius) {
  const results = [];
  const minCol = Math.floor((px - radius) / GRID_CELL);
  const maxCol = Math.floor((px + radius) / GRID_CELL);
  const minRow = Math.floor((py - radius) / GRID_CELL);
  const maxRow = Math.floor((py + radius) / GRID_CELL);
  for (let c = minCol; c <= maxCol; c++) {
    for (let r = minRow; r <= maxRow; r++) {
      const ids = grid[`${c},${r}`];
      if (ids) results.push(...ids);
    }
  }
  return results;
}

function initPhysics(mark) {
  if (physicsState[mark.id]) return;
  const seed = hashStr(mark.id);
  physicsState[mark.id] = {
    px: mark.x * W, py: mark.y * H,
    vx: (seededRandom(seed) - 0.5) * 0.3,
    vy: (seededRandom(seed + 1) - 0.5) * 0.3,
    ax: 0, ay: 0,
    wanderAngle: seededRandom(seed + 2) * Math.PI * 2,
    phase: seededRandom(seed + 3) * Math.PI * 2,
    spawnTime: performance.now(),
    scale: 0,
  };
}

function updatePhysics(mark, dt, t) {
  const p = physicsState[mark.id];
  if (!p) return;
  
  const s = mark.size;
  const homeX = mark.x * W;
  const homeY = mark.y * H;
  
  const age = (performance.now() - p.spawnTime) / 1000;
  p.scale = Math.min(1, age / 0.8);
  
  p.ax = 0; p.ay = 0;
  
  switch (mark.behavior) {
    case 'drift':
      p.wanderAngle += (Math.sin(t * 0.7 + p.phase) * 0.02);
      p.ax += Math.cos(p.wanderAngle) * 0.08;
      p.ay += Math.sin(p.wanderAngle) * 0.06;
      break;
    case 'orbit': {
      const orbitR = s * 2;
      const angle = t * 0.5 + p.phase;
      p.ax += (homeX + Math.cos(angle) * orbitR - p.px) * 0.02;
      p.ay += (homeY + Math.sin(angle) * orbitR - p.py) * 0.02;
      break;
    }
    case 'pulse':
      p.ax += Math.sin(t * 3 + p.phase) * 0.03;
      p.ay += Math.cos(t * 2.7 + p.phase * 1.3) * 0.03;
      break;
    case 'breathe': {
      const ba = t * 0.2 + p.phase;
      p.ax += Math.cos(ba) * 0.01;
      p.ay += Math.sin(ba) * 0.01;
      break;
    }
    case 'shimmer':
      p.ax += Math.sin(t * 8 + p.phase) * 0.05;
      p.ay += Math.cos(t * 7.3 + p.phase) * 0.04;
      break;
    case 'still':
      p.ax += (homeX - p.px) * 0.05;
      p.ay += (homeY - p.py) * 0.05;
      break;
  }
  
  // Home spring
  if (mark.behavior !== 'orbit') {
    const dx = homeX - p.px, dy = homeY - p.py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxDrift = s * 4;
    if (dist > maxDrift) {
      const strength = (dist - maxDrift) * 0.003;
      p.ax += (dx / dist) * strength;
      p.ay += (dy / dist) * strength;
    }
  }
  
  // Mouse repulsion
  if (mouseX > 0 && !isPanning) {
    const mWorld = screenToWorld(mouseX, mouseY);
    const mdx = p.px - mWorld.wx, mdy = p.py - mWorld.wy;
    const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mDist < 120 && mDist > 0) {
      const repel = (1 - mDist / 120) * 0.5;
      p.ax += (mdx / mDist) * repel;
      p.ay += (mdy / mDist) * repel;
    }
  }
  
  // Inter-mark forces
  const neighborIds = getNeighbors(p.px, p.py, 200);
  for (const nId of neighborIds) {
    if (nId === mark.id) continue;
    const op = physicsState[nId];
    if (!op) continue;
    const dx = op.px - p.px, dy = op.py - p.py;
    const distSq = dx * dx + dy * dy;
    if (distSq < 1 || distSq > 40000) continue;
    const dist = Math.sqrt(distSq);
    const other = marksById[nId];
    if (!other) continue;
    
    if (other.agentId === mark.agentId) {
      if (dist > 80) { p.ax += (dx / dist) * 0.003; p.ay += (dy / dist) * 0.003; }
      else if (dist < 30) { p.ax -= (dx / dist) * 0.01; p.ay -= (dy / dist) * 0.01; }
    } else {
      if (dist < 50) { p.ax -= (dx / dist) * 0.005; p.ay -= (dy / dist) * 0.005; }
    }
  }
  
  p.vx += p.ax * dt; p.vy += p.ay * dt;
  p.vx *= 0.96; p.vy *= 0.96;
  const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
  const maxSpeed = mark.behavior === 'still' ? 0.5 : 2.0;
  if (speed > maxSpeed) { p.vx = (p.vx / speed) * maxSpeed; p.vy = (p.vy / speed) * maxSpeed; }
  p.px += p.vx; p.py += p.vy;
  
  // Connection attraction — gently drift toward connected agents
  for (const conn of connections) {
    let partnerId = null;
    if (conn.from === mark.agentId) partnerId = conn.to;
    else if (conn.to === mark.agentId) partnerId = conn.from;
    if (!partnerId) continue;

    // Find nearest mark of partner
    const partnerMarks = marks.filter(m => m.agentId === partnerId);
    for (const pm of partnerMarks) {
      const pp = physicsState[pm.id];
      if (!pp) continue;
      const cdx = pp.px - p.px, cdy = pp.py - p.py;
      const cDist = Math.sqrt(cdx * cdx + cdy * cdy);
      if (cDist > 30 && cDist < 400) {
        // Very gentle pull
        p.ax += (cdx / cDist) * 0.002;
        p.ay += (cdy / cDist) * 0.002;
      }
    }
  }

  if (p.px < 20) p.vx += 0.1;
  if (p.px > W - 20) p.vx -= 0.1;
  if (p.py < 20) p.vy += 0.1;
  if (p.py > H - 20) p.vy -= 0.1;
}

// ============================================================
// WEBSOCKET
// ============================================================

let _rebuildTimer = null;
function debouncedFetchAgentsAndRebuild(delay = 500) {
  if (_rebuildTimer) clearTimeout(_rebuildTimer);
  _rebuildTimer = setTimeout(fetchAgentsAndRebuild, delay);
}

async function fetchAgentsAndRebuild() {
  try {
    const res = await fetch('/api/agents');
    const agents = await res.json();
    rebuildAllAgentPrograms(agents);
  } catch (e) {
    console.error('Failed to fetch agents', e);
  }
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      marks = msg.marks;
      connections = msg.connections || [];
      marks.forEach(initPhysics);
      rebuildIndex();
      fetchAgentsAndRebuild();
    } else if (msg.type === 'agent:shader' || msg.type === 'shader:updated') {
      // Single agent shader update — rebuild just that agent
      if (msg.shaderCode && msg.agentId) {
        rebuildSingleAgent(msg.agentId, msg.shaderCode);
      } else {
        debouncedFetchAgentsAndRebuild();
      }
    } else if (msg.type === 'mark:created') {
      marks.push(msg.mark);
      initPhysics(msg.mark);
      rebuildIndex();
      if (msg.mark.agentId && !agentRenderers[msg.mark.agentId]) {
        debouncedFetchAgentsAndRebuild();
      }
    } else if (msg.type === 'mark:updated') {
      const idx = marks.findIndex(m => m.id === msg.mark.id);
      if (idx >= 0) { marks[idx] = msg.mark; marksById[msg.mark.id] = msg.mark; }
    } else if (msg.type === 'mark:deleted') {
      marks = marks.filter(m => m.id !== msg.id);
      delete physicsState[msg.id]; delete marksById[msg.id];
    } else if (msg.type === 'connection:created') {
      connections.push(msg.connection);
    } else if (msg.type === 'connection:deleted') {
      connections = connections.filter(c => !(
        (c.from === msg.from && c.to === msg.to) || (c.from === msg.to && c.to === msg.from)
      ));
    } else if (msg.type === 'marks:cleared') {
      marks.filter(m => m.agentId === msg.agentId).forEach(m => { delete physicsState[m.id]; delete marksById[m.id]; });
      marks = marks.filter(m => m.agentId !== msg.agentId);
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => ws.close();
}
connect();

function rebuildIndex() { marksById = {}; for (const m of marks) marksById[m.id] = m; }

// ============================================================
// TEXT OVERLAY
// ============================================================

function drawConnections(t) {
  // Draw luminous threads between connected agents
  // Find center of mass for each agent
  const agentCenters = {};
  const agentColors = {};
  for (const mark of marks) {
    const p = physicsState[mark.id];
    if (!p || p.scale < 0.01) continue;
    if (!agentCenters[mark.agentId]) {
      agentCenters[mark.agentId] = { sx: 0, sy: 0, count: 0 };
      agentColors[mark.agentId] = mark.color;
    }
    const scr = worldToScreen(p.px, p.py);
    agentCenters[mark.agentId].sx += scr.sx;
    agentCenters[mark.agentId].sy += scr.sy;
    agentCenters[mark.agentId].count++;
  }
  for (const id in agentCenters) {
    const c = agentCenters[id];
    c.sx /= c.count;
    c.sy /= c.count;
  }

  for (const conn of connections) {
    const a = agentCenters[conn.from];
    const b = agentCenters[conn.to];
    if (!a || !b) continue;

    const colA = agentColors[conn.from] || '#ffffff';
    const colB = agentColors[conn.to] || '#ffffff';

    // Animated thread with slight wave
    const dx = b.sx - a.sx, dy = b.sy - a.sy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) continue;

    const segments = Math.max(8, Math.floor(dist / 10));
    const nx = -dy / dist, ny = dx / dist; // perpendicular

    tCtx.save();
    tCtx.beginPath();
    tCtx.moveTo(a.sx, a.sy);

    for (let i = 1; i < segments; i++) {
      const frac = i / segments;
      const lx = a.sx + dx * frac;
      const ly = a.sy + dy * frac;
      // Wave displacement
      const wave = Math.sin(frac * Math.PI * 3 + t * 1.5) * 4 * Math.sin(frac * Math.PI);
      tCtx.lineTo(lx + nx * wave, ly + ny * wave);
    }
    tCtx.lineTo(b.sx, b.sy);

    // Pulse alpha
    const pulse = 0.15 + 0.1 * Math.sin(t * 2 + dist * 0.01);
    const [rA, gA, bA] = hexToRgb(colA);
    const [rB, gB, bB] = hexToRgb(colB);
    const midR = Math.round((rA + rB) / 2);
    const midG = Math.round((gA + gB) / 2);
    const midB = Math.round((bA + bB) / 2);

    tCtx.strokeStyle = `rgba(${midR},${midG},${midB},${pulse})`;
    tCtx.lineWidth = 1.5;
    tCtx.shadowColor = `rgba(${midR},${midG},${midB},${pulse * 0.5})`;
    tCtx.shadowBlur = 8;
    tCtx.stroke();
    tCtx.restore();
  }
}

function drawTextOverlay(t) {
  tCtx.clearRect(0, 0, W, H);
  drawConnections(t);
  for (const mark of marks) {
    if (mark.type !== 'text' || !mark.text) continue;
    const p = physicsState[mark.id];
    if (!p || p.scale < 0.01) continue;
    
    const [r, g, b] = hexToRgb(mark.color);
    const sz = mark.size * p.scale * camZoom;
    const fontSize = sz * (mark.text.length > 10 ? 0.8 : 1);
    const scr = worldToScreen(p.px, p.py);
    let alphaM = 1;
    if (mark.behavior === 'pulse') alphaM = 0.75 + 0.25 * Math.sin(t * 2.5 + p.phase);
    if (mark.behavior === 'shimmer') alphaM = 0.3 + 0.7 * Math.abs(Math.sin(t * 5 + p.phase));
    const a = mark.opacity * alphaM * p.scale;
    
    tCtx.save();
    tCtx.textAlign = 'center';
    tCtx.textBaseline = 'middle';
    tCtx.font = `${fontSize * 1.05}px 'Syne', sans-serif`;
    tCtx.fillStyle = `rgba(${r},${g},${b},${a * 0.2})`;
    tCtx.fillText(mark.text, scr.sx, scr.sy);
    tCtx.font = `${fontSize}px 'Syne', sans-serif`;
    tCtx.fillStyle = `rgba(${r},${g},${b},${a * 0.9})`;
    tCtx.fillText(mark.text, scr.sx, scr.sy);
    tCtx.restore();
  }
}

const tooltip = document.getElementById('tooltip');
const ttName = document.getElementById('tt-name');
const ttInfo = document.getElementById('tt-info');

canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX - canvasOffsetX; mouseY = e.clientY - canvasOffsetY; });
canvas.addEventListener('mouseleave', () => { mouseX = mouseY = -1; });

function checkHover() {
  if (mouseX < 0 || isPanning) { tooltip.classList.remove('show'); return; }
  let closest = null, closestDist = Infinity;
  for (const mark of marks) {
    const p = physicsState[mark.id];
    if (!p) continue;
    const scr = worldToScreen(p.px, p.py);
    const dx = mouseX - scr.sx, dy = mouseY - scr.sy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const r = mark.size * 2.5 * camZoom;
    if (dist < r + 15 && dist < closestDist) { closest = { mark, dist }; closestDist = dist; }
  }
  if (closest) {
    ttName.textContent = closest.mark.agentName;
    ttName.style.color = closest.mark.color;
    ttInfo.textContent = closest.mark.type;
    tooltip.style.left = (mouseX + canvasOffsetX + 16) + 'px';
    tooltip.style.top = (mouseY + canvasOffsetY - 16) + 'px';
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
}

// ============================================================
// RENDER LOOP
//
// Pipeline:
//   1. Background pass (to scene FBO)
//   2. Per-agent passes with additive blending (to scene FBO)
//   3. Tone mapping (scene FBO → screen, or → bloom pipeline)
//   4. Bloom post-process (optional)
//   5. Text overlay (2D canvas)
// ============================================================

let lastTime = 0;

function render(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  const t = now * 0.001;
  
  // FPS
  fpsFrames++;
  if (now - fpsTime >= 1000) { currentFps = fpsFrames; fpsFrames = 0; fpsTime = now; }
  
  // Physics
  rebuildGrid();
  for (const mark of marks) updatePhysics(mark, dt, t);
  
  // Update mark data texture (sorted by agent)
  updateMarkDataTexture(marks);
  
  const cw = canvas.width, ch = canvas.height;
  const mouseGlX = mouseX > 0 ? mouseX * DPR : -1;
  const mouseGlY = mouseX > 0 ? (H - mouseY) * DPR : -1;
  
  // --- Render to scene FBO ---
  gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFBO);
  gl.viewport(0, 0, cw, ch);
  
  // Pass 1: Background (opaque, no blending)
  gl.disable(gl.BLEND);
  gl.useProgram(bgProg);
  gl.uniform2f(bgU.u_resolution, cw, ch);
  gl.uniform1f(bgU.u_time, t);
  gl.uniform2f(bgU.u_mouse, mouseGlX, mouseGlY);
  drawQuad(bgProg);
  
  // Pass 2: Per-agent additive passes (scissored to bounding box)
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE); // additive
  gl.enable(gl.SCISSOR_TEST);
  
  for (const agentId in agentRenderers) {
    const r = agentRenderers[agentId];
    if (!r.program || r.markCount === 0) continue;
    
    // Scissor to agent's bounding box — skip pixels far from marks
    if (r.scissor && r.scissor.w > 0 && r.scissor.h > 0) {
      gl.scissor(r.scissor.x, r.scissor.y, r.scissor.w, r.scissor.h);
    } else {
      gl.scissor(0, 0, cw, ch);
    }
    
    gl.useProgram(r.program);
    gl.uniform2f(r.uniforms.u_resolution, cw, ch);
    gl.uniform1f(r.uniforms.u_time, t);
    gl.uniform2f(r.uniforms.u_mouse, mouseGlX, mouseGlY);
    gl.uniform1i(r.uniforms.u_markStart, r.markStart);
    gl.uniform1i(r.uniforms.u_markCount, r.markCount);
    gl.uniform1i(r.uniforms.u_dataWidth, markDataWidth);
    
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, markDataTex);
    gl.uniform1i(r.uniforms.u_markData, 0);
    
    drawQuad(r.program);
  }
  
  gl.disable(gl.SCISSOR_TEST);
  gl.disable(gl.BLEND);
  
  // Pass 3: Tone mapping + output
  if (bloomEnabled) {
    const bw = Math.floor(cw / 2), bh = Math.floor(ch / 2);
    
    // Extract bright areas
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO1);
    gl.viewport(0, 0, bw, bh);
    gl.useProgram(extractProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, sceneTexture);
    gl.uniform1i(extractU.u_scene, 0);
    gl.uniform2f(extractU.u_resolution, bw, bh);
    drawQuad(extractProg);
    
    // Blur H
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO2);
    gl.useProgram(blurProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, bloomTex1);
    gl.uniform1i(blurU.u_tex, 0);
    gl.uniform2f(blurU.u_resolution, bw, bh);
    gl.uniform2f(blurU.u_direction, 1, 0);
    drawQuad(blurProg);
    
    // Blur V
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO1);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, bloomTex2);
    gl.uniform2f(blurU.u_direction, 0, 1);
    drawQuad(blurProg);
    
    // Second blur pass (wider)
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO2);
    gl.bindTexture(gl.TEXTURE_2D, bloomTex1);
    gl.uniform2f(blurU.u_direction, 2, 0);
    drawQuad(blurProg);
    
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFBO1);
    gl.bindTexture(gl.TEXTURE_2D, bloomTex2);
    gl.uniform2f(blurU.u_direction, 0, 2);
    drawQuad(blurProg);
    
    // Composite scene + bloom to screen
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, cw, ch);
    gl.useProgram(compositeProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, sceneTexture);
    gl.uniform1i(compositeU.u_scene, 0);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, bloomTex1);
    gl.uniform1i(compositeU.u_bloom, 1);
    gl.uniform2f(compositeU.u_resolution, cw, ch);
    gl.uniform1f(compositeU.u_bloomStrength, 0.4);
    drawQuad(compositeProg);
  } else {
    // No bloom — tone map directly to screen
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, cw, ch);
    gl.useProgram(tonemapProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, sceneTexture);
    gl.uniform1i(tonemapU.u_scene, 0);
    gl.uniform2f(tonemapU.u_resolution, cw, ch);
    drawQuad(tonemapProg);
  }
  
  // Text overlay
  drawTextOverlay(t);
  checkHover();
  
  requestAnimationFrame(render);
}

resize();
requestAnimationFrame(render);
</script>
</body>
</html>
